name: Unit Tests + Jira Xray Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Run Unit Tests (no DB required)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 2026-03-09-students-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests and generate XML report
        run: |
          uv run pytest \
            tests/test_student_service.py \
            tests/test_student_db.py \
            --junitxml=report.xml \
            -v
        continue-on-error: true

      - name: Upload XML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: 2026-03-09-students-app/report.xml

      - name: Report results to Jira Xray
        uses: mikepenz/xray-action@v3
        if: always()
        continue-on-error: true
        with:
          username: ${{ secrets.XRAY_CLIENT_ID }}
          password: ${{ secrets.XRAY_CLIENT_SECRET }}
          testFormat: "junit"
          testPaths: "2026-03-09-students-app/report.xml"
          projectKey: "KAN"
          testExecKey: ""
          cloud: true
