name: Student App CI to Jira

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 2026-03-09-students-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.9
        run: uv python install 3.9

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests (no DB required in CI)
        id: run-tests
        run: |
          uv run pytest \
            tests/test_student_service.py \
            tests/test_student_db.py \
            --junitxml=report.xml \
            -v
        continue-on-error: true

      - name: Upload test report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: 2026-03-09-students-app/report.xml

      - name: Post test results to Jira KAN-4
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            ICON="✅"
            STATUS="All 19 unit tests PASSED"
          else
            ICON="❌"
            STATUS="Tests FAILED — check GitHub Actions"
          fi
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": {
                \"type\": \"doc\",
                \"version\": 1,
                \"content\": [
                  {
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"${ICON} CI Run #${{ github.run_number }} — ${STATUS}\"
                    }]
                  },
                  {
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"Branch: main | Commit: ${{ github.sha }}\"
                    }]
                  }
                ]
              }
            }" \
            "https://ayaaryan085-1781792010769.atlassian.net/rest/api/3/issue/KAN-4/comment"
