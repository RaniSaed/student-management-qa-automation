name: Student App CI to Jira

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    # All `run` steps execute inside the project subdirectory
    # where pyproject.toml lives
    defaults:
      run:
        working-directory: 2026-03-09-students-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.9
        run: uv python install 3.9

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests (no DB required in CI)
        run: |
          uv run pytest \
            tests/test_student_service.py \
            tests/test_student_db.py \
            --junitxml=report.xml \
            -v
        continue-on-error: true

      - name: Upload test report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: 2026-03-09-students-app/report.xml

      - name: Report Results to Jira (Xray)
        uses: mikepenz/xray-action@v3
        if: always()
        continue-on-error: true
        with:
          username: ${{ secrets.XRAY_CLIENT_ID }}
          password: ${{ secrets.XRAY_CLIENT_SECRET }}
          testFormat: 'junit'
          testPaths: '2026-03-09-students-app/report.xml'
          projectKey: 'AYAAR4'
          xrayBaseUrl: 'https://eu.xray.cloud.getxray.app/'
